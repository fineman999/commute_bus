<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="원주 건강보험심사평가원 출퇴근 통근버스 9개 노선을 지도에서 비교하고, 주소를 입력해 가장 가까운 정류장 Top 3를 찾는 거리 분석 도구."
    />
    <title>원주 통근버스 노선 확인 & 거리 분석</title>
    <meta property="og:type" content="website" />
    <meta property="og:title" content="원주 통근버스 노선 확인 & 거리 분석" />
    <meta
      property="og:description"
      content="출퇴근 통근버스 노선을 지도에서 비교하고, 집 주소 기준 가장 가까운 정류장을 찾아보세요."
    />
    <meta property="og:locale" content="ko_KR" />
    <script>
      // paint 전에 테마를 적용해 라이트→다크 깜빡임(FOUC)을 막는다.
      // 저장된 선호 > OS 설정 순. (키는 useTheme.ts 와 동일하게 유지)
      ;(function () {
        try {
          var saved = localStorage.getItem('commute-bus-theme')
          var dark =
            saved === 'dark' ||
            (!saved && matchMedia('(prefers-color-scheme: dark)').matches)
          if (dark) document.documentElement.classList.add('dark')
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
